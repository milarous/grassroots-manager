<div id="confirmIgnoreModal" class="modal">
    <div class="modal-content">
        <h2>Confirm Ignore</h2>
        <p class="modal-description">Are you sure you want to ignore this player?</p>
        
        <div class="modal-buttons" style="margin-top: 20px;">
            <button id="confirmIgnoreBtn" class="btn-confirm">Yes</button>
            <button class="btn-cancel" onclick="closeConfirmIgnoreModal()">No</button>
        </div>
    </div>
</div>
