<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitions</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px;
            margin: 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        
        .return-btn {
            padding: 10px 20px;
            background-color: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        
        .return-btn:hover {
            background-color: #0b7dda;
        }
        
        .save-btn {
            padding: 10px 20px;
            background-color: #f44336;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        .save-btn:hover {
            background-color: #d32f2f;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .modal.show {
            display: block;
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 5px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .modal-content h3 {
            margin-top: 0;
            color: #333;
        }
        
        .slot-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .slot-btn {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .slot-btn:hover {
            background-color: #45a049;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .container {
            display: flex;
            gap: 40px;
        }
        
        .left-menu {
            flex: 0 0 150px;
        }
        
        .menu-button {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            border: none;
            font-size: 14px;
            box-sizing: border-box;
            line-height: 1.5;
        }
        
        .menu-button:hover {
            background-color: #45a049;
        }
        
        .right-content {
            flex: 1;
        }
        
        ul { 
            list-style-type: none; 
            padding: 0; 
        }
        
        li { 
            background-color: #f9f9f9; 
            margin: 5px 0; 
            padding: 10px; 
            border-radius: 5px; 
        }
        
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Competitions</h1>
        <div style="position: absolute; top: 0; right: 0; display: flex; gap: 10px; align-items: center;">
            <button onclick="openSaveModal()" class="save-btn">Save Game</button>
            <a href="/" class="return-btn">Return to Main Menu</a>
        </div>
    </div>
    
    <div class="container">
        <div class="left-menu">
            <a href="/club" class="menu-button">Club Overview</a>
            <a href="/squad" class="menu-button">View Squad</a>
            <a href="/facilities" class="menu-button">View Facilities</a>
            <a href="/competitions" class="menu-button" style="background-color: #2196F3; cursor: default;">View Competitions</a>
        </div>
        
        <div class="right-content">
            <p>No competitions yet! Join some soon...</p>
        </div>
    </div>
    
    <footer>
        <p>© Coffee Addickt Games, 2026<br>Early Development Edition</p>
    </footer>
    
    <!-- Save Game Modal -->
    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h3>Select Save Slot</h3>
            <div class="slot-buttons">
                <button onclick="saveGame(1)" class="slot-btn">Save to Slot 1</button>
                <button onclick="saveGame(2)" class="slot-btn">Save to Slot 2</button>
                <button onclick="saveGame(3)" class="slot-btn">Save to Slot 3</button>
            </div>
            <div class="modal-buttons">
                <button onclick="closeSaveModal()" style="background-color: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        function openSaveModal() {
            document.getElementById('saveModal').classList.add('show');
        }
        
        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('show');
        }
        
        function saveGame(slot) {
            window.location.href = '/save_game/' + slot;
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('saveModal');
            if (event.target === modal) {
                closeSaveModal();
            }
        }
    </script>
</body>
</html>
