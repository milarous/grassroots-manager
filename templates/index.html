<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grassroots Football Manager</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .menu-buttons { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        a, button { display: block; width: 200px; padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; font-size: 16px; box-sizing: border-box; }
        a:hover, button:hover { background-color: #45a049; }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .modal.show {
            display: block;
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 5px;
            width: 300px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .modal-content h2 {
            margin-top: 0;
            color: #333;
        }
        
        .modal-content h3 {
            margin-top: 0;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            margin: 0;
        }
        
        .modal-buttons .cancel {
            background-color: #f44336;
        }
        
        .modal-buttons .cancel:hover {
            background-color: #da190b;
        }
        
        .slot-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .slot-btn {
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        
        .slot-btn:hover:not(:disabled) {
            background-color: #45a049;
        }
        
        .slot-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            color: #999;
        }
        
        /* Load Modal styles */
        .load-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        /* Load Modal styles - removed, now uses .modal class */
        
        .slot-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }
        
        .slot-label {
            font-weight: bold;
        }
        
        .slot-timestamp {
            font-size: 12px;
            color: #ccc;
        }
        
        .slot-club-info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Grassroots Football Manager</h1>
    <p style="font-size: 16px; color: #666; margin-top: -10px;">A grassroots-to-pro football club management sim</p>
    <div class="menu-buttons">
        <button onclick="openClubForm()">Create Club</button>
        <button onclick="openLoadModal()" style="color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px;">Load Game</button>
        <a href="/exit">Exit Game</a>
    </div>
    
    <!-- Load Game Modal -->
    <div id="loadModal" class="modal">
        <div class="modal-content">
            <h3>Load Game</h3>
            <p style="font-size: 14px; color: #666; margin-bottom: 15px;">Select a save to load</p>
            
            <div id="slotSelectionStepLoad">
                <div class="slot-buttons" id="slotButtonsContainerLoad">
                    <!-- Slots will be populated via JavaScript -->
                </div>
            </div>
            
            <div id="loadConfirmStep" style="display: none;">
                <div id="selectedSlotInfoLoad" style="padding: 15px; background-color: #f0f0f0; border-radius: 4px; margin-bottom: 15px;">
                    <!-- Selected slot info will be shown here -->
                </div>
            </div>
            
            <div class="modal-buttons">
                <button id="backBtnLoad" onclick="backToSlotSelectionLoad()" style="display: none; background-color: #2196F3; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Back</button>
                <button id="confirmBtnLoad" onclick="confirmLoad()" style="display: none; background-color: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Load</button>
                <button onclick="closeLoadModal()" style="background-color: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>
    
    <!-- New Club Information Modal -->
    <div id="clubFormModal" class="modal">
        <div class="modal-content">
            <h2>New Club Information</h2>
            <form id="clubForm" method="POST" action="/create_club">
                <div class="form-group">
                    <label for="club_name">Club Name:</label>
                    <input type="text" id="club_name" name="club_name" required>
                </div>
                
                <div class="form-group">
                    <label for="country">Country:</label>
                    <select id="country" name="country" required>
                        <option value="">-- Select Country --</option>
                        <option value="Australia">Australia</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="city">City:</label>
                    <select id="city" name="city" required>
                        <option value="">-- Select City --</option>
                        <option value="Adelaide">Adelaide</option>
                    </select>
                </div>
                
                <div class="modal-buttons">
                    <button type="submit">Confirm</button>
                    <button type="button" class="cancel" onclick="closeClubForm()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const saveSlots = {{ save_slots | tojson }};
        
        function openClubForm() {
            document.getElementById('clubFormModal').classList.add('show');
        }
        
        function closeClubForm() {
            document.getElementById('clubFormModal').classList.remove('show');
            document.getElementById('clubForm').reset();
        }
        
        function openLoadModal() {
            initializeLoadModal();
            backToSlotSelectionLoad();
            document.getElementById('loadModal').classList.add('show');
        }
        
        function closeLoadModal() {
            document.getElementById('loadModal').classList.remove('show');
        }
        
        function initializeLoadModal() {
            const container = document.getElementById('slotButtonsContainerLoad');
            if (!container || !saveSlots) return;
            
            container.innerHTML = '';
            
            for (let slot = 1; slot <= 3; slot++) {
                const slotData = saveSlots[slot.toString()];
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'slot-btn';
                button.onclick = () => selectSlotLoad(slot);
                
                let buttonText = `Slot ${slot}`;
                if (slotData.exists) {
                    buttonText += ` - ${slotData.label}`;
                } else {
                    buttonText += ' (Empty)';
                    button.disabled = true;
                }
                
                button.innerHTML = buttonText;
                container.appendChild(button);
            }
        }
        
        function selectSlotLoad(slot) {
            const slotData = saveSlots[slot.toString()];
            
            // Update UI to show confirm step
            document.getElementById('slotSelectionStepLoad').style.display = 'none';
            document.getElementById('loadConfirmStep').style.display = 'block';
            document.getElementById('backBtnLoad').style.display = 'inline-block';
            document.getElementById('confirmBtnLoad').style.display = 'inline-block';
            
            // Show selected slot details
            let infoHtml = `<strong>Loading from Slot ${slot}</strong><br><br>`;
            infoHtml += `<strong>Save Details:</strong><br>`;
            infoHtml += `Label: ${slotData.label}<br>`;
            infoHtml += `Date: ${slotData.timestamp}<br>`;
            if (slotData.club_info) {
                infoHtml += `<br>Club: ${slotData.club_info.name}<br>`;
                infoHtml += `Location: ${slotData.club_info.city}, ${slotData.club_info.country}<br>`;
                infoHtml += `Finances: $${slotData.club_info.finances}<br>`;
                infoHtml += `Reputation: ${slotData.club_info.reputation}`;
            }
            
            document.getElementById('selectedSlotInfoLoad').innerHTML = infoHtml;
            window.selectedLoadSlot = slot;
        }
        
        function backToSlotSelectionLoad() {
            document.getElementById('slotSelectionStepLoad').style.display = 'block';
            document.getElementById('loadConfirmStep').style.display = 'none';
            document.getElementById('backBtnLoad').style.display = 'none';
            document.getElementById('confirmBtnLoad').style.display = 'none';
            window.selectedLoadSlot = null;
        }
        
        function confirmLoad() {
            if (window.selectedLoadSlot === null) {
                alert('Please select a slot first');
                return;
            }
            window.location.href = '/load_game/' + window.selectedLoadSlot;
        }
        
        // Close modal when clicking outside of it
        window.onclick = function(event) {
            var modal = document.getElementById('clubFormModal');
            var loadModal = document.getElementById('loadModal');
            if (event.target == modal) {
                closeClubForm();
            }
            if (event.target == loadModal) {
                closeLoadModal();
            }
        }
    </script>
    
    <footer>
        <p>© Coffee Addickt Games, 2026<br>Early Development Edition</p>
    </footer>
</body>
</html>
