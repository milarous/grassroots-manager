<!-- Save Game Modal - Include this in any page that needs save functionality -->
<!-- Requires: save_slots variable to be passed from Flask -->
<!-- Requires: static/save_modal.js to be included in the page -->

<div id="saveModal" class="modal">
    <div class="modal-content">
        <h3>Save Game</h3>
        <p class="modal-description">Select a slot to overwrite or create a new save</p>
        
        <div id="slotSelectionStep">
            <div class="slot-buttons" id="slotButtonsContainer">
                <!-- Slots will be populated via JavaScript -->
            </div>
        </div>
        
        <div id="labelConfirmStep" class="hidden">
            <div id="selectedSlotInfo" class="modal-info-box">
                <!-- Selected slot info will be shown here -->
            </div>
            <div class="modal-form-row">
                <label for="saveLabel">Save Label:</label>
                <input type="text" id="saveLabel" name="label" placeholder="Enter a name for this save">
            </div>
        </div>
        
        <div class="modal-buttons">
            <button id="backBtn" onclick="backToSlotSelection()" class="btn-back">Back</button>
            <button id="confirmBtn" onclick="confirmSave()" class="btn-confirm">Confirm Save</button>
            <button onclick="closeSaveModal()" class="btn-cancel">Cancel</button>
        </div>
    </div>
</div>
